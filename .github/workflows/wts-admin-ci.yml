name: wts-admin CI

on:
  push:
    branches: [main]
    paths:
      - 'wts-admin/**'
      - '.github/workflows/wts-admin-ci.yml'
  pull_request:
    paths:
      - 'wts-admin/**'
      - '.github/workflows/wts-admin-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wts-admin

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wts_admin_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: wts-admin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: |
          set -e
          find server.js src database scripts test -name '*.js' -print0 | xargs -0 -n1 node --check
          echo "all files parse"

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/wts_admin_test

      - name: Audit dependencies
        run: npm audit --audit-level=high
