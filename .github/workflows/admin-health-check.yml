# Uptime monitor for the Railway admin backend (API + Postgres).
# Every 15 minutes: probe /health with retries; on persistent failure open
# (or bump) a single tracking issue; close it automatically on recovery.
name: Admin Health Check

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  issues: write

concurrency:
  group: admin-health-check
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe /health (3 attempts, 30s apart)
        id: probe
        run: |
          URL="https://admin.wordsthatsells.website/health"
          for attempt in 1 2 3; do
            body="$(curl -sS --max-time 20 "$URL" || true)"
            code="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 20 "$URL" || echo 000)"
            echo "attempt $attempt: HTTP $code $body"
            if [ "$code" = "200" ] && echo "$body" | grep -q '"db":"ok"'; then
              echo "status=up" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            [ "$attempt" -lt 3 ] && sleep 30
          done
          echo "status=down" >> "$GITHUB_OUTPUT"
          echo "detail=HTTP $code — $body" >> "$GITHUB_OUTPUT"

      - name: Open or update outage issue / close on recovery
        uses: actions/github-script@v7
        env:
          PROBE_STATUS: ${{ steps.probe.outputs.status }}
          PROBE_DETAIL: ${{ steps.probe.outputs.detail }}
        with:
          script: |
            const TITLE = '🔴 Admin backend health check failing';
            const LABEL = 'outage';
            const { owner, repo } = context.repo;

            try {
              await github.rest.issues.getLabel({ owner, repo, name: LABEL });
            } catch (e) {
              await github.rest.issues.createLabel({ owner, repo, name: LABEL, color: 'b60205', description: 'Automated uptime alerts' });
            }

            const open = await github.rest.issues.listForRepo({ owner, repo, state: 'open', labels: LABEL, per_page: 5 });
            const existing = open.data.find(i => i.title === TITLE);

            if (process.env.PROBE_STATUS === 'down') {
              const body = [
                'The scheduled health probe failed 3 consecutive attempts against',
                '`https://admin.wordsthatsells.website/health`.',
                '',
                '```',
                process.env.PROBE_DETAIL || 'no response detail',
                '```',
                '',
                'Check the Railway dashboard: service status, deploy logs, and the Postgres add-on.',
                `_Run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}_`,
              ].join('\n');
              if (existing) {
                await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body: 'Still failing.\n\n' + body });
              } else {
                await github.rest.issues.create({ owner, repo, title: TITLE, labels: [LABEL], body });
              }
            } else if (existing) {
              await github.rest.issues.createComment({ owner, repo, issue_number: existing.number, body: '✅ Health check recovered — closing.' });
              await github.rest.issues.update({ owner, repo, issue_number: existing.number, state: 'closed' });
            }
