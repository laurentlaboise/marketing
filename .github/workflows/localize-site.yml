name: Localize site (/th /la /fr)

# Regenerates the localized page mirrors from published translations.
#
# Triggered by:
#   - the wts-admin approve flow (workflow_dispatch fired by
#     src/lib/github-content.js when a page/glossary/article translation
#     is published) — the SuperAdmin "Publish & Generate" path
#   - manual runs from the Actions tab
#
# The generator reads published translations from the wts-admin public
# API (/api/public/translations/:lang/page). The admin base URL resolves
# in order: repository VARIABLE WTS_ADMIN_URL → repository SECRET
# WTS_ADMIN_URL (either place works — the two tabs are easy to mix up) →
# the live admin domain as a default. The URL is not sensitive: it is the
# public address of the admin panel, referenced throughout the repo docs.
# The generator is idempotent: every run rebuilds all published pages, so
# missed dispatches self-heal.
on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'What triggered this run'
        required: false
      langs:
        description: 'Languages to generate (comma-separated)'
        required: false
        default: 'th,la,fr'
  # Nightly self-heal: the publish-time dispatch from wts-admin is
  # best-effort, so a missed or failed dispatch would leave published
  # translations absent from the live site until someone notices. The
  # generator is idempotent and cheap; regenerating nightly guarantees
  # the site converges on the published state within a day. Runs 30 min
  # before the daily localization watchdog Routine (01:01 UTC), which
  # then verifies the freshly generated state.
  schedule:
    - cron: '30 0 * * *'

permissions:
  contents: write

concurrency:
  group: localize-site
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history → stable sitemap lastmod dates

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '20'

      - name: Check admin URL is configured
        env:
          ADMIN_URL: ${{ vars.WTS_ADMIN_URL || secrets.WTS_ADMIN_URL || 'https://admin.wordsthatsells.website' }}
        run: |
          if [ -z "$ADMIN_URL" ]; then
            echo "::error::Set the repository variable WTS_ADMIN_URL to the wts-admin base URL (Settings → Secrets and variables → Actions → Variables)."
            exit 1
          fi
          echo "Admin URL resolved."

      - name: Generate localized pages
        env:
          ADMIN_URL: ${{ vars.WTS_ADMIN_URL || secrets.WTS_ADMIN_URL || 'https://admin.wordsthatsells.website' }}
        run: |
          node scripts/generate-localized-pages.js \
            --api "$ADMIN_URL" \
            --langs "${{ github.event.inputs.langs || 'th,la,fr' }}" \
            --update-en-hreflang

      - name: Localize footers on generated pages
        run: node scripts/inject-footers.js --source

      - name: Regenerate multi-language sitemap
        run: node scripts/generate-sitemap.js

      - name: hreflang consistency audit
        run: node scripts/check-hreflang.js

      - name: Commit changes (if any)
        # reason is free text — inject via env, never inline into the
        # script (shell injection), and keep it out of the YAML block
        # scalar (a column-1 line inside `run: |` ends the block and
        # invalidates the whole workflow file).
        env:
          REASON: ${{ github.event.inputs.reason || (github.event_name == 'schedule' && 'nightly self-heal' || 'manual run') }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "wts-localize-bot"
            git config user.email "actions@users.noreply.github.com"
            git add th la fr en sitemap.xml 2>/dev/null || true
            git commit -m "Regenerate localized pages from published translations" -m "Triggered: $REASON"
            git push
          else
            echo "No changes to commit."
          fi
