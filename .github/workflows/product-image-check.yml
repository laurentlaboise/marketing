# Guard the product media pipeline: every image_url / slide_in image the
# admin DB serves must resolve to a file shipped by this repo.
# - PRs / pushes touching product images or the checker: repo-file check.
# - Weekly schedule + manual runs: also HTTP-check the live URLs.
name: Product Image Check

on:
  pull_request:
    paths:
      - 'images/products/**'
      - 'scripts/check-product-images.js'
  push:
    branches: [main]
    paths:
      - 'images/products/**'
      - 'scripts/check-product-images.js'
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: '20'
      - name: Check product image references
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            node scripts/check-product-images.js --live
          else
            node scripts/check-product-images.js
          fi
