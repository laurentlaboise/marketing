<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    
    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
    <link rel="shortcut icon" href="/favicon/favicon.ico">
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LMRKC1VBBB"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-LMRKC1VBBB');
    </script>
    
    <script>
        // Custom 404 handler:
        //  1. Clean article URLs (/{lang}/articles/slug) load the language's
        //     SPA shell via history.replaceState — falling back to the
        //     English shell while a localized one doesn't exist yet.
        //  2. Localized paths (/th /la /fr) with no generated file yet are
        //     served the English page (GitHub Pages equivalent of the
        //     Netlify 302 fallback; real files always win once generated).
        //  3. Anything else shows a 404 message in the page's language.
        (function() {
            const path = window.location.pathname;

            // 0. Nested locale prefixes (/en/la/…) — legacy URLs from the
            //    old switcher bug. The locale lives at the ROOT of the
            //    path, exactly one segment deep: collapse the stack to the
            //    LAST locale mentioned (the language most recently asked
            //    for) and replace, never append: /en/la/pricing → /la/pricing.
            const segs = path.split('/').filter(Boolean);
            let depth = 0;
            while (depth < segs.length && /^(en|th|la|fr)$/.test(segs[depth])) depth++;
            if (depth > 1) {
                const rest = segs.slice(depth).join('/');
                window.location.replace(
                    '/' + segs[depth - 1] + '/' + rest +
                    (rest && path.endsWith('/') ? '/' : '') +
                    window.location.search + window.location.hash
                );
                return;
            }

            const langMatch = path.match(/^\/(en|th|la|fr)(\/.*)?$/);
            const lang = langMatch ? langMatch[1] : 'en';
            const rest = langMatch ? (langMatch[2] || '/') : path;

            // 1. Clean article URL: /{lang}/articles/slug
            const articleMatch = path.match(/^\/(en|th|la|fr)\/articles\/([^\/]+)\/?$/);
            if (articleMatch && articleMatch[2] !== 'index.html') {
                const currentUrl = window.location.href;
                const shellUrl = '/' + articleMatch[1] + '/articles/index.html';
                fetch(shellUrl)
                    .then(response => {
                        if (!response.ok) throw new Error('shell missing');
                        return response.text();
                    })
                    .then(html => {
                        document.open();
                        document.write(html);
                        document.close();
                        history.replaceState(null, '', currentUrl);
                    })
                    .catch(() => {
                        // Localized shell not generated yet → English article.
                        window.location.replace(
                            articleMatch[1] === 'en'
                                ? '/en/articles/index.html'
                                : '/en/articles/' + articleMatch[2]
                        );
                    });
                return;
            }

            // 2. Localized page not generated yet → English equivalent.
            if (langMatch && lang !== 'en') {
                window.location.replace('/en' + rest + window.location.search + window.location.hash);
                return;
            }

            // 3. Localized 404 message (strings mirror src/locales/site/*.json).
            const MESSAGES = {
                en: { title: '404 - Page Not Found', body: 'The page you are looking for does not exist.', home: 'Go to Homepage', dir: 'en' },
                th: { title: '404 - ไม่พบหน้านี้', body: 'ไม่พบหน้าที่คุณกำลังค้นหา', home: 'กลับไปหน้าแรก', dir: 'th' },
                la: { title: '404 - ບໍ່ພົບໜ້ານີ້', body: 'ບໍ່ພົບໜ້າທີ່ທ່ານກຳລັງຊອກຫາ', home: 'ກັບໄປໜ້າຫຼັກ', dir: 'la' },
                fr: { title: '404 - Page introuvable', body: 'La page que vous recherchez n\'existe pas.', home: 'Retour à l\'accueil', dir: 'fr' }
            };
            const t = MESSAGES[lang] || MESSAGES.en;
            document.documentElement.lang = lang === 'la' ? 'lo' : lang;
            document.write('<style>body{font-family:\'Noto Sans Thai\',\'Noto Sans Lao\',sans-serif;padding:2rem;text-align:center;line-height:1.7;}h1{color:#d62b83;}</style>');
            document.write('<h1>' + t.title + '</h1>');
            document.write('<p>' + t.body + '</p>');
            document.write('<a href="/' + t.dir + '/">' + t.home + '</a>');
        })();
    </script>
</head>
<body>
    <p style="text-align:center;padding:2rem;">Loading article...</p>
</body>
</html>
