    <script>
      // Language router — absolute locale routing from the root:
      //   1. saved preference (wts_lang cookie, written by the footer
      //      language selector) wins;
      //   2. else the browser's language list (navigator.languages is the
      //      client-side mirror of the Accept-Language header) — the FIRST
      //      supported entry decides (th → /th/, lo → /la/, fr → /fr/,
      //      en → /en/);
      //   3. unsupported or undetectable → /en/ immediately.
      // Targets are always root-absolute ('/xx/'), so the locale can never
      // stack onto an existing path. The meta refresh above stays as the
      // no-JS fallback to /en/. Missing localized trees are safe — the 404
      // handler bounces any not-yet-generated /th /la /fr path back to /en.
      (function () {
        var SUPPORTED = { en: 'en', th: 'th', lo: 'la', fr: 'fr' };
        var m = document.cookie.match(/(?:^|;\s*)wts_lang=(en|th|la|fr)/);
        var target = m && m[1];
        if (!target) {
          var prefs = (navigator.languages && navigator.languages.length)
            ? navigator.languages
            : [navigator.language || ''];
          for (var i = 0; i < prefs.length && !target; i++) {
            var primary = String(prefs[i] || '').toLowerCase().split('-')[0];
            if (SUPPORTED[primary]) target = SUPPORTED[primary];
          }
        }
        window.location.replace('/' + (target || 'en') + '/' + window.location.search + window.location.hash);
      })();
    </script>
